<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Expenses by Amount</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <nav class="nav-menu">
        <a href="index.html">Home</a>
        <a href="date-search.html">Search by Date</a>
        <a href="amount-search.html" class="active">Search by Amount</a>
    </nav>

    <h1>Search Expenses by Amount Range</h1>

    <div class="search-container">
        <div class="form-container">
            <div class="form-group">
                <label for="minAmount">Minimum Amount:</label>
                <input type="number" id="minAmount" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="maxAmount">Maximum Amount:</label>
                <input type="number" id="maxAmount" step="0.01" required>
            </div>
            <button onclick="getExpensesByAmountRange()">Search</button>
        </div>

        <div class="summary-container">
            <div class="total-amount">
                Total Amount: $ <span id="totalAmount">0.00</span>
            </div>
        </div>

        <div class="expenses-container">
            <h2>Results</h2>
            <div id="expensesList"></div>
        </div>
    </div>
</div>
<script src="js/script.js"></script>
<script src="js/amount-search.js"></script>
</body>
</html>
